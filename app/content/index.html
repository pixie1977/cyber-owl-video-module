<!DOCTYPE html>
<html>
<head>
    <title>Jetson WebRTC Stream</title>
    <!-- Подключаем скрипт из комплекта jetson-utils -->
    <script src="http://{{ ip }}:8554/webrtc.js"></script>
</head>
<body onload="playStream('video-canvas', 'http://' + window.location.hostname + ':8554/my_stream')">
    <h1>Live Stream (Hardware Accelerated)</h1>
    <div style="width: 1280px; height: 720px;">
        <video id="video-canvas" autoplay playsinline muted style="width: 100%; border: 1px solid #000;"></video>
    </div>
</body>
</html>
