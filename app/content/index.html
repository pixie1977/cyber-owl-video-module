<!DOCTYPE html>
<html>
<head>
    <title>Jetson WebRTC Stream</title>
    <!-- Подключаем скрипт WebRTC -->
    <script src="http://{{ ip }}:8554/webrtc.js"></script>
    <script type="text/javascript">
        window.onload = function() {
            const pc_ip = window.location.hostname;
            const stream_url = `http://${pc_ip}:8554/my_stream`;
            console.log("Connecting to stream:", stream_url);

            // Используем playStream из webrtc.js
            playStream('video-player', stream_url);
        };
    </script>
</head>
<body>
<h1>Live Stream (Hardware Accelerated)</h1>
<video id="video-player" autoplay playsinline muted style="width: 100%; max-width: 1280px;"></video>

<!-- Важно: подключение webrtc.js ДО конца body -->
<script src="http://{{ ip }}:8554/webrtc.js"></script>
</body>
</html>
